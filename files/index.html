<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mirror — your Hinge data, privately</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FBF9F5;
    --ink: #2B2723;
    --ink-soft: #6B645B;
    --ink-faint: #A39C90;
    --clay: #C77B54;
    --clay-deep: #A35E3B;
    --sage: #7A8B6F;
    --cold: #D8D2C6;
    --line: #E8E2D6;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
  #root { width: 100%; overflow-x: hidden; }
  ::selection { background: rgba(199,123,84,0.18); }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
// ---- PARSER (inlined, browser-only) ----
const PHONE_RE = /\+?\d[\d\s\-]{7,}\d/;
const SWITCH_RE = /whatsapp|instagram|\binsta\b|\bsnap\b|my number|exchange numbers|@\w+/i;
function sortedMessages(t){return (t.chats||[]).filter(c=>c&&c.body).slice().sort((a,b)=>(a.timestamp||"").localeCompare(b.timestamp||""));}
function isRealMatch(t){return Object.prototype.hasOwnProperty.call(t,"match");}
function metAt(t){return (t.we_met||[]).some(w=>w.did_meet_subject==="Yes");}
function escalated(x){return PHONE_RE.test(x)||SWITCH_RE.test(x);}
function outcomeOf(t){const m=sortedMessages(t);const x=m.map(z=>z.body).join(" ");if(metAt(t))return"met";if(escalated(x))return"escalated";return"cold";}
function analyze(raw){
  if(!Array.isArray(raw)) throw new Error("That file doesn't look like a Hinge matches export.");
  const likes=raw.filter(t=>!isRealMatch(t)).length;
  const matches=raw.filter(isRealMatch);
  const convos=matches.filter(m=>sortedMessages(m).length>0);
  let met=0,esc=0,cold=0,tY=0,tN=0,total=0;
  const lens=[],hours=new Array(24).fill(0);
  for(const m of matches){const o=outcomeOf(m);
    if(o==="met"){met++;for(const w of (m.we_met||[])){if(w.was_my_type===true)tY++;else if(w.was_my_type===false)tN++;}}
    else if(o==="escalated")esc++;else cold++;}
  for(const m of convos){const ms=sortedMessages(m);lens.push(ms.length);total+=ms.length;
    for(const z of ms){const h=parseInt((z.timestamp||"").slice(11,13),10);if(!isNaN(h))hours[h]++;}}
  lens.sort((a,b)=>a-b);
  const median=lens.length?lens[Math.floor(lens.length/2)]:0;
  const milestones=[1,2,4,8,16,32,64];
  const survival=milestones.map(n=>({n,pct:convos.length?Math.round(lens.filter(l=>l>=n).length/convos.length*100):0}));
  return {
    funnel:{likes,matches:matches.length,conversations:convos.length,reached:esc+met,dates:met,myType:tY},
    outcomes:{met,escalated:esc,cold},
    fit:{myType:tY,notMyType:tN},
    conversation:{count:convos.length,median,longest:lens.length?lens[lens.length-1]:0,totalMessages:total,survival,hours}
  };
}
window.__analyze = analyze;
</script>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

// ---------- small helpers ----------
function useReveal() {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setShown(true); io.disconnect(); } },
      { threshold: 0.25 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return [ref, shown];
}

const fmt = (n) => n.toLocaleString("en-US");

// ---------- the connecting spine ----------
// A single clay line down the page that thins as the population shrinks.
function Spine({ stages, active }) {
  // stages: array of {y, width} fractions — but we render a simple tapering line.
  return (
    <div aria-hidden="true" style={{
      position: "absolute", left: "50%", top: 0, bottom: 0,
      transform: "translateX(-50%)", width: 60, pointerEvents: "none", zIndex: 0
    }}>
      <svg width="60" height="100%" preserveAspectRatio="none" viewBox="0 0 60 1000"
           style={{ position: "absolute", inset: 0, height: "100%" }}>
        <defs>
          <linearGradient id="taper" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#C77B54" stopOpacity="0.9" />
            <stop offset="100%" stopColor="#C77B54" stopOpacity="0.5" />
          </linearGradient>
        </defs>
        <path d="M30,0 C30,250 30,250 30,500 C30,750 30,750 30,1000"
              stroke="url(#taper)" strokeWidth="2" fill="none" />
      </svg>
    </div>
  );
}

// ---------- upload / trust ----------
function Upload({ onData }) {
  const [drag, setDrag] = useState(false);
  const [err, setErr] = useState("");
  const inputRef = useRef(null);

  function handleFile(file) {
    setErr("");
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const raw = JSON.parse(e.target.result);
        const result = window.__analyze(raw);
        onData(result);
      } catch (ex) {
        setErr("Couldn't read that file. It should be the matches.json from your Hinge export.");
      }
    };
    reader.onerror = () => setErr("Couldn't open that file. Try again.");
    reader.readAsText(file);
  }

  return (
    <section style={{ minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", textAlign: "center",
      padding: "2rem 1.5rem", position: "relative", zIndex: 1 }}>
      <p style={{ fontFamily: "var(--sans)", fontSize: 13, letterSpacing: "0.18em",
        textTransform: "uppercase", color: "var(--ink-faint)", marginBottom: "1.5rem" }}>
        A private mirror
      </p>
      <h1 style={{ fontFamily: "var(--serif)", fontWeight: 400, fontSize: "clamp(2.6rem, 7vw, 5rem)",
        lineHeight: 1.05, letterSpacing: "-0.02em", maxWidth: 760, marginBottom: "1.5rem" }}>
        See the shape of your <em style={{ fontStyle: "italic", color: "var(--clay-deep)" }}>dating life</em>.
      </h1>
      <p style={{ fontSize: "1.05rem", color: "var(--ink-soft)", maxWidth: 520, marginBottom: "2.5rem" }}>
        Drop in your Hinge data export and watch the numbers narrow — from every like,
        down to the people who actually became something.
      </p>

      <div
        role="button" tabIndex={0}
        onClick={() => inputRef.current && inputRef.current.click()}
        onKeyDown={(e) => (e.key === "Enter" || e.key === " ") && inputRef.current.click()}
        onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={(e) => { e.preventDefault(); setDrag(false); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
        style={{
          width: "min(440px, 90vw)", padding: "2.25rem 2rem",
          border: `1.5px dashed ${drag ? "var(--clay)" : "var(--line)"}`,
          borderRadius: 18, background: drag ? "rgba(199,123,84,0.05)" : "#fff",
          cursor: "pointer", transition: "all .2s ease", outline: "none"
        }}>
        <div style={{ fontFamily: "var(--serif)", fontSize: "1.15rem", marginBottom: 6 }}>
          Drop your <code style={{ fontFamily: "var(--sans)", background: "rgba(199,123,84,0.1)",
            padding: "1px 7px", borderRadius: 6, color: "var(--clay-deep)", fontSize: "0.95rem" }}>matches.json</code>
        </div>
        <div style={{ color: "var(--ink-faint)", fontSize: "0.9rem" }}>or click to choose a file</div>
        <input ref={inputRef} type="file" accept=".json,application/json" style={{ display: "none" }}
          onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])} />
      </div>

      {err && <p style={{ color: "var(--clay-deep)", marginTop: "1rem", fontSize: "0.9rem", maxWidth: 440 }}>{err}</p>}

      <button onClick={() => onData(window.__analyze(window.SAMPLE_MATCHES))}
        style={{ marginTop: "1.75rem", background: "none", border: "none", cursor: "pointer",
          color: "var(--ink-soft)", textDecoration: "underline", textUnderlineOffset: 4,
          fontFamily: "var(--sans)", fontSize: "0.92rem" }}>
        or explore with sample data
      </button>

      <div style={{ marginTop: "3rem", display: "flex", alignItems: "center", gap: 10,
        color: "var(--ink-faint)", fontSize: "0.85rem", maxWidth: 480 }}>
        <span style={{ fontSize: "1.1rem" }}>⊘</span>
        <span style={{ textAlign: "left" }}>
          Nothing leaves this page. Your file is read in your browser and never sent anywhere —
          open your network tab and check. Close the tab and it's gone.
        </span>
      </div>
    </section>
  );
}

// ---------- the funnel hero ----------
function Funnel({ f }) {
  const [ref, shown] = useReveal();
  const rows = [
    { label: "likes in your orbit", n: f.likes, color: "var(--cold)", note: "people who liked you, or you them" },
    { label: "became matches", n: f.matches, color: "#CDBBA6", note: "mutual" },
    { label: "turned into conversations", n: f.conversations, color: "#C79B74", note: "you almost always say something" },
    { label: "reached a number or a date", n: f.reached, color: "var(--clay)", note: "the real shortlist" },
    { label: "became dates", n: f.dates, color: "var(--clay-deep)", note: "you actually met" },
    { label: "were your type", n: f.myType, color: "var(--sage)", note: "by your own call" },
  ];
  const max = rows[0].n || 1;

  return (
    <section ref={ref} style={{ position: "relative", zIndex: 1, padding: "8vh 1.5rem 10vh",
      maxWidth: 720, margin: "0 auto" }}>
      <p style={{ fontSize: 13, letterSpacing: "0.18em", textTransform: "uppercase",
        color: "var(--ink-faint)", textAlign: "center", marginBottom: "0.75rem" }}>The funnel</p>
      <h2 style={{ fontFamily: "var(--serif)", fontWeight: 400, fontSize: "clamp(1.8rem,4vw,2.6rem)",
        textAlign: "center", lineHeight: 1.15, marginBottom: "3.5rem", letterSpacing: "-0.01em" }}>
        {fmt(f.likes)} people, and it narrows to {fmt(f.myType)}.
      </h2>

      <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
        {rows.map((r, i) => {
          const w = Math.max(6, (r.n / max) * 100);
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: "1rem",
              opacity: shown ? 1 : 0, transform: shown ? "none" : "translateY(12px)",
              transition: `all .6s ease ${i * 0.12}s` }}>
              <div style={{ flex: "0 0 46%", textAlign: "right" }}>
                <div style={{ fontFamily: "var(--serif)", fontSize: "1.5rem", lineHeight: 1,
                  color: "var(--ink)" }}>{fmt(r.n)}</div>
                <div style={{ fontSize: "0.82rem", color: "var(--ink-soft)", marginTop: 2 }}>{r.label}</div>
              </div>
              <div style={{ flex: 1, position: "relative" }}>
                <div style={{ height: 34, width: shown ? `${w}%` : 0, background: r.color,
                  borderRadius: 6, transition: `width .9s cubic-bezier(.22,1,.36,1) ${i * 0.12}s` }} />
              </div>
            </div>
          );
        })}
      </div>

      <p style={{ marginTop: "3rem", textAlign: "center", color: "var(--ink-soft)",
        fontSize: "1rem", maxWidth: 540, marginInline: "auto" }}>
        The steepest drop isn't where you'd think. You convert matches into conversations
        beautifully — {f.conversations} of {f.matches}. The real attrition is everything
        upstream, and everything after the first date.
      </p>
    </section>
  );
}

// ---------- conversation deep-dive ----------
function Conversations({ c, o }) {
  const [ref, shown] = useReveal();
  return (
    <section ref={ref} style={{ position: "relative", zIndex: 1, background: "#fff",
      borderTop: "1px solid var(--line)", borderBottom: "1px solid var(--line)",
      padding: "8vh 1.5rem", }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        <p style={{ fontSize: 13, letterSpacing: "0.18em", textTransform: "uppercase",
          color: "var(--ink-faint)", textAlign: "center", marginBottom: "0.75rem" }}>The {c.count} real conversations</p>
        <h2 style={{ fontFamily: "var(--serif)", fontWeight: 400, fontSize: "clamp(1.8rem,4vw,2.6rem)",
          textAlign: "center", lineHeight: 1.15, marginBottom: "3rem", letterSpacing: "-0.01em" }}>
          A typical thread lived {c.median} messages.
        </h2>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))",
          gap: "1rem", marginBottom: "3.5rem" }}>
          {[
            { k: "median length", v: c.median + " msgs" },
            { k: "longest thread", v: fmt(c.longest) + " msgs" },
            { k: "you wrote", v: fmt(c.totalMessages) + " msgs" },
          ].map((m, i) => (
            <div key={i} style={{ background: "var(--bg)", borderRadius: 12, padding: "1.1rem 1.25rem" }}>
              <div style={{ fontSize: "0.8rem", color: "var(--ink-faint)", marginBottom: 6 }}>{m.k}</div>
              <div style={{ fontFamily: "var(--serif)", fontSize: "1.55rem" }}>{m.v}</div>
            </div>
          ))}
        </div>

        {/* survival curve */}
        <p style={{ fontSize: "0.92rem", color: "var(--ink-soft)", marginBottom: "1rem" }}>
          How far conversations got — share of the {c.count} that reached each length:
        </p>
        <div style={{ display: "flex", flexDirection: "column", gap: "0.55rem", marginBottom: "3rem" }}>
          {c.survival.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: "0.85rem" }}>
              <div style={{ flex: "0 0 88px", textAlign: "right", fontSize: "0.85rem",
                color: "var(--ink-soft)" }}>≥ {s.n} messages</div>
              <div style={{ flex: 1, height: 22, background: "var(--bg)", borderRadius: 5, overflow: "hidden" }}>
                <div style={{ height: "100%", width: shown ? `${s.pct}%` : 0, background: "var(--clay)",
                  borderRadius: 5, transition: `width .9s cubic-bezier(.22,1,.36,1) ${i * 0.08}s` }} />
              </div>
              <div style={{ flex: "0 0 42px", fontSize: "0.85rem", color: "var(--ink)" }}>{s.pct}%</div>
            </div>
          ))}
        </div>

        {/* outcomes */}
        <p style={{ fontSize: "0.92rem", color: "var(--ink-soft)", marginBottom: "1rem" }}>
          Where the {o.met + o.escalated + o.cold} matches landed:
        </p>
        <div style={{ display: "flex", height: 40, borderRadius: 8, overflow: "hidden",
          border: "1px solid var(--line)" }}>
          {[
            { label: "cold", n: o.cold, color: "var(--cold)", ink: "var(--ink-soft)" },
            { label: "reached out", n: o.escalated, color: "var(--clay)", ink: "#fff" },
            { label: "met", n: o.met, color: "var(--clay-deep)", ink: "#fff" },
          ].map((seg, i) => {
            const tot = o.met + o.escalated + o.cold || 1;
            const w = (seg.n / tot) * 100;
            return (
              <div key={i} title={`${seg.label}: ${seg.n}`} style={{ width: `${w}%`, background: seg.color,
                display: "flex", alignItems: "center", justifyContent: "center", color: seg.ink,
                fontSize: "0.8rem", whiteSpace: "nowrap", overflow: "hidden" }}>
                {w > 12 ? `${seg.label} · ${seg.n}` : seg.n}
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

// ---------- closing / fit ----------
function Fit({ fit }) {
  const [ref, shown] = useReveal();
  const total = fit.myType + fit.notMyType || 1;
  return (
    <section ref={ref} style={{ position: "relative", zIndex: 1, padding: "10vh 1.5rem 14vh",
      maxWidth: 640, margin: "0 auto", textAlign: "center" }}>
      <p style={{ fontSize: 13, letterSpacing: "0.18em", textTransform: "uppercase",
        color: "var(--ink-faint)", marginBottom: "0.75rem" }}>The last gate</p>
      <h2 style={{ fontFamily: "var(--serif)", fontWeight: 400, fontSize: "clamp(1.8rem,4vw,2.6rem)",
        lineHeight: 1.15, marginBottom: "2rem", letterSpacing: "-0.01em" }}>
        Even reaching a date was close to a coin-flip on fit.
      </h2>
      <div style={{ display: "flex", justifyContent: "center", gap: "2.5rem", marginBottom: "2rem" }}>
        <div>
          <div style={{ fontFamily: "var(--serif)", fontSize: "3rem", color: "var(--sage)",
            opacity: shown ? 1 : 0, transition: "opacity .8s ease" }}>{fit.myType}</div>
          <div style={{ color: "var(--ink-soft)", fontSize: "0.9rem" }}>your type</div>
        </div>
        <div>
          <div style={{ fontFamily: "var(--serif)", fontSize: "3rem", color: "var(--ink-faint)",
            opacity: shown ? 1 : 0, transition: "opacity .8s ease .2s" }}>{fit.notMyType}</div>
          <div style={{ color: "var(--ink-soft)", fontSize: "0.9rem" }}>not</div>
        </div>
      </div>
      <p style={{ color: "var(--ink-soft)", fontSize: "1rem", maxWidth: 480, marginInline: "auto" }}>
        This is a mirror, not a verdict — it only sees your side of things, and it can't
        tell who went quiet first. But the shape is real, and the shape is the point.
      </p>
    </section>
  );
}

// ---------- app ----------
function App() {
  const [data, setData] = useState(null);

  if (!data) return <Upload onData={setData} />;

  return (
    <div style={{ position: "relative" }}>
      <Spine />
      <header style={{ position: "relative", zIndex: 1, textAlign: "center", padding: "6vh 1.5rem 2vh" }}>
        <p style={{ fontFamily: "var(--serif)", fontStyle: "italic", fontSize: "1.4rem",
          color: "var(--clay-deep)" }}>Your mirror</p>
        <button onClick={() => setData(null)} style={{ marginTop: 8, background: "none", border: "none",
          color: "var(--ink-faint)", cursor: "pointer", fontSize: "0.85rem", textDecoration: "underline",
          textUnderlineOffset: 3 }}>start over with another file</button>
      </header>
      <Funnel f={data.funnel} />
      <Conversations c={data.conversation} o={data.outcomes} />
      <Fit fit={data.fit} />
      <footer style={{ position: "relative", zIndex: 1, textAlign: "center", padding: "3vh 1.5rem 6vh",
        color: "var(--ink-faint)", fontSize: "0.82rem" }}>
        Read entirely in your browser. Nothing was uploaded or stored.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
